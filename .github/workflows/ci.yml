name: Cypress Tests

on:
  push:
    branches:
      - main
      - exercicios/modulo-4
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Executar testes Cypress
        run: npx cypress run

      - name: Criar página de relatório
        if: always()
        run: |
          mkdir -p public
          cat > public/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="pt-br">
          <head>
            <meta charset="UTF-8">
            <title>Relatório Cypress</title>
            <style>
              body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
              h1 { color: #2e7d32; }
              .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; max-width: 800px; }
              .ok { color: #2e7d32; font-weight: bold; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>Relatório de Testes Cypress</h1>
              <p class="ok">Pipeline executado com sucesso no GitHub Actions.</p>
              <p>Os testes automatizados Cypress foram executados em ambiente de integração contínua.</p>

              <h2>Resumo</h2>
              <ul>
                <li>Execução automática via GitHub Actions</li>
                <li>Testes Cypress executados</li>
                <li>Resultado publicado via GitHub Pages</li>
              </ul>

              <h2>Repositório</h2>
              <p>
                <a href="https://github.com/Marcia-mps/cypress-ui-automation">
                  Acessar repositório no GitHub
                </a>
              </p>
            </div>
          </body>
          </html>
          EOF

      - name: Publicar relatório no GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public